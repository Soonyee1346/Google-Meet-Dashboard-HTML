<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  </head>
  <body>
    <div class="container mt-4">
      <h1>Meet Device Status</h1>
      <table class="table table-striped">
        <thead>
          <tr>
            <th>Location</th><th>Room</th><th>Issue</th><th>Action</th>
          </tr>
        </thead>
        <tbody id="table-body">
          </tbody>
      </table>
    </div>

    <script>
      // Call the server-side function to get data
      google.script.run.withSuccessHandler(showData).getDashboardData();

      function showData(data) {
        let tbody = document.getElementById('table-body');
        data.forEach(row => {
          let tr = `<tr>
            <td>${row[1]}</td><td>${row[2]}</td><td>${row[4]}</td>
            <td><button class="btn btn-sm btn-success" onclick="resolve('${row[5]}')">Resolve</button></td>
          </tr>`;
          tbody.innerHTML += tr;
        });
      }
    </script>
  </body>
</html>
